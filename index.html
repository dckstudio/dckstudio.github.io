<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DCK STUDIO | Film</title>
    
    <style>
        /* Design Minimaliste Noir */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Fond noir profond */
            overflow: hidden; /* Évite le scroll si une seule vidéo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container du Player Responsive 16:9 */
        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube-nocookie.com/embed/-XtdCsE3ILA?rel=0&modestbranding=1&iv_load_policy=3&color=white&controls=1&playlist=-XtdCsE3ILA" 
            title="DCK STUDIO - VIDEO"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
