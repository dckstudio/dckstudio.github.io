<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCK STUDIO | Narrative & Contemporary Arts</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --dim: #555; }
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'EB Garamond', Garamond, Georgia, serif; 
            -webkit-font-smoothing: antialiased; 
        }
        header { padding: 60px 40px; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { font-weight: 900; letter-spacing: 0.6em; font-size: 0.8rem; text-transform: uppercase; font-family: sans-serif; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid #222; font-family: sans-serif; }
        .hero { padding: 40px; margin-bottom: 80px; }
        h1 { font-size: clamp(3rem, 12vw, 8rem); font-weight: 100; text-transform: uppercase; line-height: 0.85; margin: 0; letter-spacing: -0.04em; }
        .hero-desc { max-width: 550px; margin-top: 40px; font-size: 1.2rem; line-height: 1.6; color: #888; }
        .work-grid { padding: 0 40px 100px 40px; max-width: 1400px; margin: 0 auto; }
        .work-item { margin-bottom: 120px; }
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background: #080808; 
            margin-bottom: 25px; 
            border: 1px solid #111;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .work-meta { display: flex; justify-content: space-between; align-items: flex-start; border-top: 1px solid #111; padding-top: 25px; }
        .work-title { font-size: 1.5rem; text-transform: uppercase; margin: 0; font-weight: 400; }
        .work-tags { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: #555; text-align: right; font-family: sans-serif; }
        footer { padding: 60px 40px; border-top: 1px solid #111; font-size: 0.6rem; letter-spacing: 0.3em; color: #333; text-transform: uppercase; display: flex; justify-content: space-between; font-family: sans-serif; }
        @media (max-width: 768px) {
            header, .hero, .work-grid { padding: 20px; }
            .work-meta { flex-direction: column; gap: 15px; }
            .work-tags { text-align: left; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">DCK STUDIO</div>
        <a href="mailto:emerikp@gmail.com" class="nav-link">Contact</a>
    </header>
    <div class="hero">
        <h1>Post-Production</h1>
        <div class="hero-desc">
            Istanbul. 16 ans d'expertise. Montage documentaire, restauration et sound design immersif.
        </div>
    </div>
    <div class="work-grid">
        <div class="work-item">
            <div class="video-wrapper">
                <iframe src="https://player.vimeo.com/video/1054363236?h=0b4d4b1a1a&badge=0&autopause=0&player_id=0&app_id=58479" allowfullscreen></iframe>
            </div>
            <div class="work-meta">
                <h2 class="work-title">L3_C3RCL3</h2>
                <div class="work-tags">Post-Production / <b>Technical Director</b></div>
            </div>
        </div>
    </div>
    <footer>
        <div>© 2026 DCK PRODUCTION</div>
        <div>ISTANBUL / REMOTE</div>
    </footer>
</body>
</html>
