<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCK STUDIO | Narrative & Contemporary Arts</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --dim: #555; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 200; -webkit-font-smoothing: antialiased; }
        
        /* Minimalist Header */
        header { padding: 60px 40px; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { font-weight: 900; letter-spacing: 0.6em; font-size: 0.8rem; text-transform: uppercase; }
        .nav-link { color: var(--text); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 4px; transition: 0.3s; }
        .nav-link:hover { border-bottom-color: #fff; }

        /* Artistic Hero */
        .hero { padding: 40px; margin-bottom: 80px; }
        h1 { font-size: clamp(3rem, 12vw, 8rem); font-weight: 100; text-transform: uppercase; line-height: 0.85; margin: 0; letter-spacing: -0.04em; }
        .hero-desc { max-width: 550px; margin-top: 40px; font-size: 1.1rem; line-height: 1.7; color: #888; font-weight: 300; }

        /* Work Grid */
        .work-grid { padding: 0 40px 100px 40px; max-width: 1400px; margin: 0 auto; }
        .work-item { margin-bottom: 120px; }
        
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background: #080808; 
            margin-bottom: 25px; 
            border: 1px solid #111;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .video-wrapper:hover { transform: translateY(-5px); border-color: #333; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Work Meta */
        .work-meta { display: flex; justify-content: space-between; align-items: flex-start; border-top: 1px solid #111; padding-top: 25px; }
        .work-title { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; font-weight: 300; }
        .work-tags { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--dim); text-align: right; line-height: 2; }
        .work-tags b { color: #aaa; font-weight: 400; }

        footer { padding: 60px 40px; border-top: 1px solid #111; font-size: 0.6rem; letter-spacing: 0.3em; color: #333; text-transform: uppercase; display: flex; justify-content: space-between; }
        
        @media (max-width: 768px) {
            header, .hero, .work-grid { padding: 20px; }
            .work-meta { flex-direction: column; gap: 15px; }
