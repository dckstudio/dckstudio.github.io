<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        /* Conteneur principal pour centrer la vidéo sur ton site */
        .dck-video-wrapper {
            max-width: 1200px; /* Largeur max de ton lecteur */
            margin: 20px auto;
            background: #000;
            border: 1px solid #1a1a1a; /* Bordure discrète style studio */
        }

        /* Ratio 16:9 automatique */
        .video-responsive {
            position: relative;
            padding-bottom: 56.25%; /* Ratio pour le 1080p */
            height: 0;
            overflow: hidden;
        }

        .video-responsive iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body style="background-color: #000;"> <div class="dck-video-wrapper">
        <div class="video-responsive">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/-XtdCsE3ILA?rel=0&modestbranding=1&iv_load_policy=3&showinfo=0&color=white&controls=1&playlist=-XtdCsE3ILA" 
                title="DCK STUDIO - Film"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
