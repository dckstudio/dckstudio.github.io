<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCK STUDIO</title>
    <style>
        /* DESIGN DCK STUDIO */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; /* Noir profond */
            color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            letter-spacing: 1px;
        }

        header {
            padding: 60px 50px 40px 50px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
        }

        /* CONTENU PRINCIPAL */
        .content {
            padding: 0 50px;
            display: flex;
            justify-content: flex-start;
        }

        .video-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            padding: 80px 50px 40px 50px;
            font-size: 0.7rem;
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>DCK STUDIO</h1>
        <div class="subtitle">BEYOND THE FRAME — Documentary film editor & photographer</div>
    </header>

    <div class="content">
        <div class="video-container">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/-XtdCsE3ILA?rel=0&modestbranding=1&iv_load_policy=3&color=white&controls=1&playlist=-XtdCsE3ILA" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <footer>
        © 2026 DCK STUDIO | ISTANBUL — PARIS
    </footer>

</body>
</html>
